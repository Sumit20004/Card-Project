name: Deploy Vite Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Configure Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "Checking nginx..."

            if ! command -v nginx >/dev/null 2>&1; then
                echo "Installing nginx..."
                sudo apt update
                sudo apt install -y nginx
            else
                echo "Nginx already installed"
            fi

            sudo systemctl enable nginx
            sudo systemctl start nginx

            sudo mkdir -p /var/www/frontend

            sudo chown -R ubuntu:ubuntu /var/www/frontend

            if [ ! -f /etc/nginx/sites-available/frontend ]; then

              sudo tee /etc/nginx/sites-available/frontend > /dev/null <<'EOF'
server {
    listen 80;
    server_name _;

    root /var/www/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
EOF

              sudo ln -sf /etc/nginx/sites-available/frontend \
                  /etc/nginx/sites-enabled/frontend

              sudo rm -f /etc/nginx/sites-enabled/default

            fi

            sudo nginx -t
            sudo systemctl restart nginx

      - name: Upload Build Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/frontend"

      - name: Fix Permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            sudo chown -R www-data:www-data /var/www/frontend

            sudo nginx -t
            sudo systemctl reload nginx

            echo "Deployment Completed"
